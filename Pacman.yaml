behaviors:
  Pacman:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 4096
      learning_rate: 1.0e-4
      beta: 1.0e-3 
      epsilon: 0.1
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    checkpoint_interval: 100000
    keep_checkpoints: 50
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.005
        encoding_size: 64
        learning_rate: 1.0e-4
    max_steps: 5000000 
    time_horizon: 256
    summary_freq: 10000